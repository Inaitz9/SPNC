<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPNC Admin - Поръчки</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { background: #f3f4f6; }
        .status-new { background: #fef3c7; color: #92400e; }
        .status-processing { background: #dbeafe; color: #1e40af; }
        .status-completed { background: #d1fae5; color: #065f46; }
        .status-cancelled { background: #fee2e2; color: #991b1b; }
        #admin-content { display: none; }
    </style>
</head>
<body class="p-8">

    <!-- Login Screen -->
    <div id="login-screen" class="min-h-screen flex items-center justify-center">
        <div class="bg-white p-8 rounded-2xl shadow-lg max-w-md w-full">
            <div class="text-center mb-8">
                <i class="fas fa-user-shield text-4xl text-cyan-600 mb-4"></i>
                <h1 class="text-2xl font-bold">SPNC Admin</h1>
                <p class="text-gray-500">Вход за администратор</p>
            </div>
            <form onsubmit="event.preventDefault(); login();">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Потребителско име</label>
                    <input type="text" id="username" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-cyan-500 focus:border-transparent" required>
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Парола</label>
                    <input type="password" id="password" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-cyan-500 focus:border-transparent" required>
                </div>
                <div id="login-error" class="text-red-500 text-sm mb-4 hidden"></div>
                <button type="submit" class="w-full bg-cyan-600 hover:bg-cyan-700 text-white py-3 rounded-lg font-medium transition">
                    Вход
                </button>
            </form>
        </div>
    </div>

    <!-- Admin Content -->
    <div id="admin-content">
        <div class="max-w-7xl mx-auto">
            <div class="flex justify-between items-center mb-8">
                <div>
                    <h1 class="text-3xl font-bold text-gray-800">Поръчки</h1>
                    <p class="text-gray-500">Управление на поръчки от магазина</p>
                </div>
                <div class="flex items-center gap-4">
                    <span class="text-gray-500" id="user-display"></span>
                    <button onclick="logout()" class="text-gray-500 hover:text-gray-700">
                        <i class="fas fa-sign-out-alt"></i> Изход
                    </button>
                    <button onclick="loadOrders()" class="bg-cyan-600 hover:bg-cyan-700 text-white px-6 py-3 rounded-lg transition">
                        <i class="fas fa-sync-alt mr-2"></i> Обнови
                    </button>
                </div>
            </div>

        <!-- Stats -->
        <div class="grid grid-cols-4 gap-4 mb-8">
            <div class="bg-white p-6 rounded-xl shadow-sm">
                <div class="text-3xl font-bold text-cyan-600" id="total-orders">0</div>
                <div class="text-gray-500">Всички поръчки</div>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm">
                <div class="text-3xl font-bold text-yellow-600" id="new-orders">0</div>
                <div class="text-gray-500">Нови</div>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm">
                <div class="text-3xl font-bold text-blue-600" id="processing-orders">0</div>
                <div class="text-gray-500">В обработка</div>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm">
                <div class="text-3xl font-bold text-green-600" id="revenue">0 лв.</div>
                <div class="text-gray-500">Приходи</div>
            </div>
        </div>

        <!-- Orders Table -->
        <div class="bg-white rounded-xl shadow-sm overflow-hidden">
            <table class="w-full">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-6 py-4 text-left text-sm font-semibold text-gray-600">ID</th>
                        <th class="px-6 py-4 text-left text-sm font-semibold text-gray-600">Клиент</th>
                        <th class="px-6 py-4 text-left text-sm font-semibold text-gray-600">Продукти</th>
                        <th class="px-6 py-4 text-left text-sm font-semibold text-gray-600">Сума</th>
                        <th class="px-6 py-4 text-left text-sm font-semibold text-gray-600">Дата</th>
                        <th class="px-6 py-4 text-left text-sm font-semibold text-gray-600">Куриер</th>
                        <th class="px-6 py-4 text-left text-sm font-semibold text-gray-600">Статус</th>
                        <th class="px-6 py-4 text-left text-sm font-semibold text-gray-600">Действия</th>
                    </tr>
                </thead>
                <tbody id="orders-table">
                    <tr>
                        <td colspan="8" class="px-6 py-8 text-center text-gray-500">Зареждане...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Order Details Modal -->
    <div id="order-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50">
        <div class="bg-white rounded-2xl p-8 max-w-2xl w-full mx-4 max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-start mb-6">
                <h2 class="text-2xl font-bold">Детайли за поръчка</h2>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
            </div>
            <div id="order-details"></div>
        </div>
    </div>

    <script>
        let orders = [];

        async function loadOrders() {
            try {
                const response = await fetch('/api/orders');
                orders = await response.json();
                renderOrders();
                updateStats();
            } catch (error) {
                console.error('Error loading orders:', error);
                document.getElementById('orders-table').innerHTML = 
                    '<tr><td colspan="8" class="px-6 py-8 text-center text-red-500">Грешка при зареждане</td></tr>';
            }
        }

        function renderOrders() {
            const tbody = document.getElementById('orders-table');
            if (orders.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" class="px-6 py-8 text-center text-gray-500">Няма поръчки</td></tr>';
                return;
            }

            tbody.innerHTML = orders.map(order => `
                <tr class="border-t hover:bg-gray-50">
                    <td class="px-6 py-4 font-mono text-sm">${order.id}</td>
                    <td class="px-6 py-4">
                        <div class="font-medium">${order.customer?.name || '-'}</div>
                        <div class="text-sm text-gray-500">${order.customer?.phone || '-'}</div>
                    </td>
                    <td class="px-6 py-4">
                        ${order.items.map(item => `<div class="text-sm">${item.name} × ${item.quantity}</div>`).join('')}
                    </td>
                    <td class="px-6 py-4 font-bold">${order.total} лв.</td>
                    <td class="px-6 py-4 text-sm text-gray-500">${new Date(order.date).toLocaleString('bg-BG')}</td>
                    <td class="px-6 py-4">
                        <span class="inline-flex items-center px-2 py-1 rounded-full text-sm font-medium ${order.customer?.courier === 'Econt' ? 'bg-blue-100 text-blue-800' : order.customer?.courier === 'Speedy' ? 'bg-green-100 text-green-800' : 'bg-gray-100 text-gray-600'}">
                            ${order.customer?.courier || '-'}
                        </span>
                    </td>
                    <td class="px-6 py-4">
                        <select onchange="updateStatus('${order.id}', this.value)" 
                                class="px-3 py-1 rounded-full text-sm font-medium border-0 cursor-pointer status-${order.status}">
                            <option value="new" ${order.status === 'new' ? 'selected' : ''}>Нова</option>
                            <option value="processing" ${order.status === 'processing' ? 'selected' : ''}>В обработка</option>
                            <option value="completed" ${order.status === 'completed' ? 'selected' : ''}>Завършена</option>
                            <option value="cancelled" ${order.status === 'cancelled' ? 'selected' : ''}>Отказана</option>
                        </select>
                    </td>
                    <td class="px-6 py-4">
                        <button onclick="viewOrder('${order.id}')" class="text-cyan-600 hover:text-cyan-800">
                            <i class="fas fa-eye"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        function updateStats() {
            document.getElementById('total-orders').textContent = orders.length;
            document.getElementById('new-orders').textContent = orders.filter(o => o.status === 'new').length;
            document.getElementById('processing-orders').textContent = orders.filter(o => o.status === 'processing').length;
            document.getElementById('revenue').textContent = orders.reduce((sum, o) => sum + o.total, 0) + ' лв.';
        }

        function viewOrder(orderId) {
            const order = orders.find(o => o.id === orderId);
            if (!order) return;

            document.getElementById('order-details').innerHTML = `
                <div class="space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <div class="text-sm text-gray-500">ID поръчка</div>
                            <div class="font-mono font-bold">${order.id}</div>
                        </div>
                        <div>
                            <div class="text-sm text-gray-500">Дата</div>
                            <div class="font-medium">${new Date(order.date).toLocaleString('bg-BG')}</div>
                        </div>
                    </div>
                    
                    <div class="border-t pt-4">
                        <div class="text-sm text-gray-500 mb-2">Клиент</div>
                        <div class="bg-gray-50 p-4 rounded-lg">
                            <div><strong>Име:</strong> ${order.customer?.name || '-'}</div>
                            <div><strong>Телефон:</strong> ${order.customer?.phone || '-'}</div>
                            <div><strong>Адрес:</strong> ${order.customer?.address || '-'}</div>
                            <div><strong>Куриер:</strong> ${order.customer?.courier || '-'}</div>
                        </div>
                    </div>

                    <div class="border-t pt-4">
                        <div class="text-sm text-gray-500 mb-2">Продукти</div>
                        <div class="bg-gray-50 p-4 rounded-lg space-y-2">
                            ${order.items.map(item => `
                                <div class="flex justify-between">
                                    <span>${item.name} × ${item.quantity}</span>
                                    <span class="font-medium">${item.price * item.quantity} лв.</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>

                    <div class="border-t pt-4 flex justify-between items-center">
                        <div class="text-lg font-bold">Общо</div>
                        <div class="text-2xl font-bold text-cyan-600">${order.total} лв.</div>
                    </div>
                </div>
            `;
            document.getElementById('order-modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('order-modal').classList.add('hidden');
        }

        async function updateStatus(orderId, status) {
            try {
                const response = await fetch('/api/orders/' + orderId, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status })
                });
                const result = await response.json();
                if (result.success) {
                    const order = orders.find(o => o.id === orderId);
                    if (order) order.status = status;
                    updateStats();
                }
            } catch (error) {
                console.error('Error updating status:', error);
                alert('Грешка при обновяване на статус');
            }
        }

        // Check login on start
        checkLogin();

        async function checkLogin() {
            const savedUser = localStorage.getItem('spnc_admin_user');
            if (savedUser) {
                const user = JSON.parse(savedUser);
                showAdmin(user);
                loadOrders();
            }
        }

        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('login-error');

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const result = await response.json();

                if (result.success) {
                    localStorage.setItem('spnc_admin_user', JSON.stringify(result.user));
                    showAdmin(result.user);
                    loadOrders();
                } else {
                    errorEl.textContent = result.error;
                    errorEl.classList.remove('hidden');
                }
            } catch (error) {
                errorEl.textContent = 'Грешка при вход';
                errorEl.classList.remove('hidden');
            }
        }

        function showAdmin(user) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('admin-content').style.display = 'block';
            document.getElementById('user-display').textContent = user.username;
        }

        function logout() {
            localStorage.removeItem('spnc_admin_user');
            document.getElementById('login-screen').style.display = 'flex';
            document.getElementById('admin-content').style.display = 'none';
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
            document.getElementById('login-error').classList.add('hidden');
        }
    </script>
</body>
</html>
